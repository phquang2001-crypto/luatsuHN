<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luật sư</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:Roboto; background:#0B2C4A; color:#fff;}
.container { max-width:1000px; margin:auto; padding:20px;}
.hero { display:flex; flex-wrap:wrap; gap:20px; align-items:center;}
.hero img { width:200px; border-radius:10px;}
h1 { font-family:Montserrat; color:#C9A646;}
.section { margin-top:30px;}
.card { background:#111; padding:20px; border-radius:10px;}
.btn { background:#C9A646; color:#000; padding:10px 15px; text-decoration:none; display:inline-block; margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
    <img src="../images/lawyer.jpg">
    <div>
        <h1>Luật sư Nguyễn Gia Mạnh</h1>
        <p>Luật sư</p>
        <a href="/#booking" class="btn">Đặt lịch tư vấn</a>
    </div>
</div>



<!-- ƯU ĐIỂM -->
<div class="section card">
    <h2>Ưu điểm nổi bật</h2>
    <ul>
<li>Kinh nghiệm làm việc tại nhiều công ty luật</li>
<li>Thực chiến nhiều loại tranh chấp</li>
<li>Linh hoạt trong xử lý tình huống pháp lý</li>
    </ul>
</div>

</div>

</body>
</html>
